<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    {% seo %}
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="floating-element e1">✦</div>
        <div class="floating-element e2">❀</div>
        <div class="floating-element e3">✿</div>
        <div class="floating-element e4">☆</div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-emoji">🌸</span>
                <span class="logo-text">{{ site.title }}</span>
            </a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">首页</a></li>
                <li><a href="/about.html" class="nav-link">关于</a></li>
                <li><a href="/archives.html" class="nav-link">归档</a></li>
            </ul>
        </div>
    </nav>

    {{ content }}

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>Made with 💖 by <a href="https://github.com/{{ site.github_username }}">{{ site.author }}</a></p>
            <p class="footer-extra">© 2024 {{ site.title }}</p>
        </div>
    </footer>
</body>
</html>
